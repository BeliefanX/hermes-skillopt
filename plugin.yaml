name: hermes-skillopt
version: 0.1.0
description: "Hermes SkillOpt plugin: native-Hermes eval-gated staged skill optimization with read-only native metadata, explicit adopt/rollback, and pinned upstream tracking. Does not replace Hermes curator lifecycle/archive/consolidation; SkillOpt owns staged eval evidence and adoption recommendations."
author: "BeliefanX / Hermes Agent"
provides_tools:
  - hermes_skillopt_status
  - hermes_skillopt_scout
  - hermes_skillopt_doctor
  - hermes_skillopt_dry_run
  - hermes_skillopt_run
  - hermes_skillopt_full_run
  - hermes_skillopt_optimize
  - hermes_skillopt_batch_preflight
  - hermes_skillopt_batch_run
  - hermes_skillopt_fleet_report
  - hermes_skillopt_fleet_resume_plan
  - hermes_skillopt_fleet_rollback_plan
  - hermes_skillopt_artifact_hygiene_report
  - hermes_skillopt_eval_pack_inventory
  - hermes_skillopt_eval_pack_doctor
  - hermes_skillopt_eval_pack_workflow
  - hermes_skillopt_skill_readiness_queue
  - hermes_skillopt_eval_pack_autopilot
  - hermes_skillopt_eval_pack_scaffold
  - hermes_skillopt_eval_pack_curate
  - hermes_skillopt_eval_pack_mine_sessions
  - hermes_skillopt_eval_pack_ingest_correction
  - hermes_skillopt_eval_pack_ingest_context
  - hermes_skillopt_eval_pack_negative_boundary
  - hermes_skillopt_eval_pack_promote
  - hermes_skillopt_skill_quality
  - hermes_skillopt_resume_inspect
  - hermes_skillopt_review
  - hermes_skillopt_adopt
  - hermes_skillopt_rollback
  - hermes_skillopt_upstream_status
  - hermes_skillopt_compare_upstream_pin
  - hermes_skillopt_benchmark_parity_status
  - hermes_skillopt_upstream_update
  - hermes_skillopt_import_upstream_benchmark
  - hermes_skillopt_transfer_eval
  - hermes_skillopt_conformance
  - hermes_skillopt_handoff_optimize
safety_metadata:
  schema_version: hermes-skillopt-tool-safety-v1
  compatibility: metadata_only_all_existing_tools_remain_available
  native_hermes_boundary: "Native Hermes metadata is read-only advisory guard input. Hermes curator owns lifecycle/archive/consolidation; SkillOpt owns staged eval evidence and adoption recommendations."
  scheduled_default_guidance: "Schedule only scout, doctor, eval-pack-inventory, eval-pack-doctor, or review --digest surfaces; workflow/queue surfaces are manual, and autopilot/skill-quality surfaces are manual unless they add explicit digest-only modes; never cron status/full-run/optimize/adopt/rollback/writeback/upstream-update."
  groups:
    read_only: "Inspection/inventory/digest only; only scout, doctor, eval-pack-inventory, eval-pack-doctor, and review --digest are cron-safe defaults; workflow/queue surfaces are manual, and autopilot/skill-quality surfaces are manual unless they add explicit digest-only modes."
    read_only_report: "Read-only checks with optional explicit report output; not cron-safe by default."
    stage_artifacts: "Creates staging/eval/handoff artifacts for human review; no auto-adopt/rollback and not a default cron action."
    writeback: "High-risk live SKILL.md writeback/restore after explicit typed confirmation; never cron-safe and not curator replacement."
    upstream: "Fetches/updates pinned upstream clone/lock; human-triggered only."
  tool_groups:
    read_only: [hermes_skillopt_status, hermes_skillopt_scout, hermes_skillopt_doctor, hermes_skillopt_eval_pack_inventory, hermes_skillopt_eval_pack_doctor, hermes_skillopt_eval_pack_workflow, hermes_skillopt_skill_readiness_queue, hermes_skillopt_review, hermes_skillopt_resume_inspect, hermes_skillopt_fleet_report, hermes_skillopt_fleet_resume_plan, hermes_skillopt_fleet_rollback_plan, hermes_skillopt_artifact_hygiene_report, hermes_skillopt_upstream_status, hermes_skillopt_compare_upstream_pin, hermes_skillopt_benchmark_parity_status, hermes_skillopt_batch_preflight]
    read_only_report: [hermes_skillopt_conformance, hermes_skillopt_transfer_eval, hermes_skillopt_skill_quality]
    stage_artifacts: [hermes_skillopt_dry_run, hermes_skillopt_run, hermes_skillopt_full_run, hermes_skillopt_optimize, hermes_skillopt_batch_run, hermes_skillopt_eval_pack_autopilot, hermes_skillopt_eval_pack_scaffold, hermes_skillopt_eval_pack_curate, hermes_skillopt_eval_pack_mine_sessions, hermes_skillopt_eval_pack_ingest_correction, hermes_skillopt_eval_pack_ingest_context, hermes_skillopt_eval_pack_negative_boundary, hermes_skillopt_eval_pack_promote, hermes_skillopt_import_upstream_benchmark, hermes_skillopt_handoff_optimize]
    writeback: [hermes_skillopt_adopt, hermes_skillopt_rollback]
    upstream: [hermes_skillopt_upstream_update]
