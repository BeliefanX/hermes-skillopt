<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">hermes-skillopt architecture diagram</title>
  <desc id="desc">Clear vector architecture diagram for hermes-skillopt: Hermes plugin and CLI entrypoints drive a staged orchestrator, bounded optimizer, sandbox-backed frozen target evaluator, immutable artifacts, review gates, and explicit adopt or rollback into the active Hermes skill.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#1f2937"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#1d4ed8"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 40px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #475569; }
      .section { font: 800 25px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #1e293b; }
      .small { font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #475569; }
      .warn { font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #991b1b; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 3; rx: 24; }
      .blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 3; rx: 20; }
      .purple { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 3; rx: 20; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 3; rx: 20; }
      .amber { fill: #fffbeb; stroke: #d97706; stroke-width: 3; rx: 20; }
      .red { fill: #fef2f2; stroke: #dc2626; stroke-width: 3; rx: 20; }
      .slate { fill: #f1f5f9; stroke: #64748b; stroke-width: 3; rx: 20; }
      .arrow { stroke: #1f2937; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #1d4ed8; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .dash { stroke-dasharray: 12 10; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text x="70" y="72" class="title">hermes-skillopt architecture</text>
  <text x="70" y="112" class="subtitle">Hermes-native, SkillOpt-inspired staged optimization for one SKILL.md — no Hermes core changes</text>

  <rect x="55" y="150" width="1490" height="720" class="panel"/>

  <rect x="95" y="205" width="285" height="190" class="blue"/>
  <text x="125" y="250" class="section">Entrypoints</text>
  <text x="125" y="292" class="body">• Hermes plugin tools</text>
  <text x="125" y="326" class="body">• Public CLI commands</text>
  <text x="125" y="360" class="body">• Optional WebUI</text>

  <rect x="470" y="190" width="340" height="220" class="purple"/>
  <text x="505" y="235" class="section">Staged orchestrator</text>
  <text x="505" y="277" class="body">full_run / review</text>
  <text x="505" y="311" class="body">adopt / rollback / status</text>
  <text x="505" y="352" class="small">SixStageSkillOptTrainer controls</text>
  <text x="505" y="382" class="small">rollout → reflect → aggregate → select → update → evaluate</text>

  <rect x="900" y="190" width="270" height="220" class="green"/>
  <text x="930" y="235" class="section">Optimizer</text>
  <text x="930" y="277" class="body">• Reflects on evidence</text>
  <text x="930" y="311" class="body">• Proposes bounded edits</text>
  <text x="930" y="352" class="small">Writes candidate copies only</text>
  <text x="930" y="382" class="small">Never edits live profile</text>

  <rect x="1250" y="190" width="245" height="220" class="amber"/>
  <text x="1280" y="235" class="section">Eval inputs</text>
  <text x="1280" y="277" class="body">• Curated eval packs</text>
  <text x="1280" y="311" class="body">• Static review packs</text>
  <text x="1280" y="345" class="body">• Session/fallback tasks</text>
  <text x="1280" y="382" class="small">Only eligible curated evals</text>
  <text x="1280" y="406" class="small">can support adoption</text>

  <rect x="95" y="520" width="315" height="230" class="amber"/>
  <text x="125" y="565" class="section">Frozen target executor</text>
  <text x="125" y="607" class="body">replay / scorecard / sandbox</text>
  <text x="125" y="641" class="body">frozen-hermes = sandbox MVP</text>
  <text x="125" y="675" class="body">live-readonly = disabled/report-only</text>
  <text x="125" y="718" class="small">No upstream execution or arbitrary live commands</text>

  <rect x="510" y="520" width="320" height="230" class="slate"/>
  <text x="540" y="565" class="section">Staging artifacts</text>
  <text x="540" y="607" class="body">$HERMES_HOME/skillopt/staging</text>
  <text x="540" y="641" class="body">manifest, report, diff, evidence</text>
  <text x="540" y="675" class="body">hashes, gates, candidate lineage</text>
  <text x="540" y="718" class="small">Reviewable and rollbackable by design</text>

  <rect x="930" y="520" width="265" height="230" class="red"/>
  <text x="960" y="565" class="section">Safety gates</text>
  <text x="960" y="607" class="body">• Strict validation</text>
  <text x="960" y="641" class="body">• Held-out test checks</text>
  <text x="960" y="675" class="body">• Provenance + hash checks</text>
  <text x="960" y="718" class="warn">No auto-adopt</text>

  <rect x="1280" y="520" width="215" height="230" class="green"/>
  <text x="1310" y="565" class="section">Live skill</text>
  <text x="1310" y="607" class="body">SKILL.md</text>
  <text x="1310" y="641" class="body">changes only via</text>
  <text x="1310" y="675" class="body">explicit adopt</text>
  <text x="1310" y="718" class="small">rollback restores verified backup</text>

  <path class="arrow" d="M380 300 H455"/>
  <path class="arrow" d="M810 300 H885"/>
  <path class="arrow" d="M1170 300 H1235"/>
  <path class="arrow" d="M640 410 V500"/>
  <path class="arrowBlue" d="M900 410 C780 470 520 450 410 545"/>
  <path class="arrowBlue dash" d="M1250 410 C1180 455 1125 465 1065 505"/>
  <path class="arrow" d="M830 635 H915"/>
  <path class="arrow" d="M1195 635 H1265"/>
  <path class="arrow dash" d="M1385 520 C1385 470 1330 440 1240 430"/>

  <rect x="95" y="795" width="1400" height="48" class="slate"/>
  <text x="125" y="826" class="small">Boundary summary: this plugin stages artifacts and explicit writeback for the active Hermes profile; it is not Microsoft SkillOpt parity, not upstream benchmark execution, and not a live command runner.</text>
</svg>
